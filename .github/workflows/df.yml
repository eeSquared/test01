name: Run df Command

on:
  workflow_dispatch:

jobs:
  run-df:
    runs-on: ubuntu-latest
    steps:
      - name: Run df command
        run: df -h
      - name: Run lsblk command
        run: lsblk
      - name: Run lscpu command
        run: lscpu
  run-df-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Run df command
        run: df -h
      - name: Run lsblk command
        run: lsblk
      - name: Run lscpu command
        run: lscpu
  examine-disk-win:
    runs-on: windows-latest
    steps:
      - name: check disks
        shell: pwsh
        run: |
          Get-CimInstance Win32_LogicalDisk |
            Select-Object DeviceID, VolumeName, FileSystem,
              @{n='SizeGB';f={[math]::Round($_.Size/1GB,2)}},
              @{n='FreeGB';f={[math]::Round($_.FreeSpace/1GB,2)}} |
            Format-Table -AutoSize
